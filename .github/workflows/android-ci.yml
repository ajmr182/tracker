name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}

      - name: Give permission to gradlew
        run: chmod +x gradlew

      # 🔨 Build
      - name: Build project
        run: ./gradlew build

      # 🧪 Tests
      - name: Run unit tests
        run: ./gradlew test

      # 🧹 Lint
      - name: Run lint
        run: ./gradlew lint

      # 📦 Build APK
      - name: Build APK
        run: ./gradlew assembleDebug

      # ⬆️ Upload artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk